{% extends 'accounts/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Book a Service{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow">
      <div class="card-header bg-primary text-white text-center">
        <h2>Book Your Pet Care Service</h2>
      </div>
      <div class="card-body">
        <form method="post" id="booking-form">
          {% csrf_token %}
          {{ form|crispy }}
          
          <div class="d-grid gap-2 d-md-flex justify-content-md-between mt-3">
            <button type="submit" class="btn btn-success flex-fill me-md-2">
              Book Now (Save Only)
            </button>
            <button type="button" id="pay-button" class="btn btn-primary flex-fill">
              Pay Securely with Stripe
            </button>
          </div>
        </form>

        <div class="mt-3 text-center">
          <a href="{% url 'services' %}" class="btn btn-outline-secondary me-2">
            ← Back to Services
          </a>
          <a href="{% url 'home' %}" class="btn btn-outline-secondary">
            Home
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
const stripe = Stripe('pk_test_51Sv6GIEMFGmjP42qc1Pj358IZI2xcUeg9tDqqvBPVeJ0A5e4iHQ5ETIpWPoxvk8BhOoiYdXBLlHSzupkJZIzxcOH00pmfgJ8Uc'); 
document.getElementById('pay-button').addEventListener('click', async () => {
  const service = document.querySelector('[name="service"]').value;
  const response = await fetch('/accounts/pay/', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({service})
  });
  const session = await response.json();
  stripe.redirectToCheckout({sessionId: session.id});
});
</script>
{% endblock %}
