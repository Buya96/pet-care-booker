{% extends 'accounts/base.html' %}
{% load crispy_forms_tags %}

{% block title %}{% if object %}Edit{% else %}New{% endif %} Booking{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow">
      <div class="card-header bg-primary text-white text-center">
        <h2>{% if object %}Edit{% else %}New{% endif %} Booking</h2>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-success w-100 mt-3">Save Booking</button>
        </form>
        <div class="mt-3 text-center">
          <a href="{% url 'bookings' %}" class="btn btn-outline-secondary">
            ← Back to Bookings
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
